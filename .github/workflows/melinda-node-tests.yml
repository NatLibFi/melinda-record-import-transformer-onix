name: Melinda-node-tests

on: push

jobs:
  build-node-22:
    name: Node 22
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v6
    - run: npm audit --package-lock-only --production --audit-level=high
    - run: npm ci --ignore-scripts
    - run: npm test
    - run: npm run build --if-present

  njsscan:
    name: Njsscan-check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v6
    - name: nodejsscan scan
      id: njsscan
      uses: ajinabraham/njsscan-action@master
      with:
        args: '.'

  license-scan:
    name: License compliance check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: mikaelvesavuori/license-compliance-action@v1.0.2
        with:
          exclude_pattern: /^@natlibfi/

  openshift-webhook:
    name: OpenShift webhook for image builder
    needs: [build-node-22, njsscan, license-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Test webhook
        uses: joelwmale/webhook-action@master
        if: github.ref == 'refs/heads/test'
        with:
          url: ${{ secrets.WEBHOOK_URL_TEST }}
          body: '{}'
      - name: Prod webhook
        uses: joelwmale/webhook-action@master
        if: github.ref == 'refs/heads/main'
        with:
          url: ${{ secrets.WEBHOOK_URL_PROD }}
          body: '{}'
